name: Build desktop release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-latest
            args: '--target aarch64-apple-darwin'
          - name: macos-x64
            os: macos-latest
            args: '--target x86_64-apple-darwin'
          - name: linux-x64
            os: ubuntu-22.04
            args: ''
          - name: windows-x64
            os: windows-latest
            args: ''

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.name == 'macos-arm64' && 'aarch64-apple-darwin' || matrix.name == 'macos-x64' && 'x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm ci

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'cURL Runner ${{ github.ref_name }}'
          releaseBody: |
            桌面版本下载：
            - macOS Apple Silicon → `*_aarch64.dmg`
            - macOS Intel → `*_x64.dmg`
            - Windows → `*_x64-setup.exe` / `*_x64_en-US.msi`
            - Linux → `*.AppImage` / `*.deb`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
